name: Deploy MkDocs Site

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

# Даем права на запись в содержимое репозитория
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Шаг 1: Получаем исходники из ветки main
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Шаг 2: Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      # Шаг 3: Устанавливаем зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list | grep mkdocs  # Проверяем установку

      # Шаг 4: Собираем сайт с MkDocs
      - name: Build site with MkDocs
        run: |
          cd source
          mkdocs build --verbose -d ../docs
          cd ..
          echo "✅ Site built successfully"

      # Шаг 5: Создаем файл .nojekyll для отключения Jekyll
      - name: Create .nojekyll file
        run: |
          touch docs/.nojekyll
          echo "✅ .nojekyll created in docs folder"
          
          # Проверяем содержимое папки docs
          echo "📁 Contents of docs folder:"
          ls -la docs/
          
          # Убеждаемся, что index.html существует
          if [ -f docs/index.html ]; then
            echo "✅ index.html found"
          else
            echo "⚠️ index.html not found, checking files:"
            find docs/ -name "*.html" -type f | head -5
          fi

      # Шаг 6: Деплоим в ветку release
      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: release
          force_orphan: true  # Создает чистую ветку каждый раз
          enable_jekyll: false  # Явно отключаем Jekyll
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: |
            Deploy MkDocs site from main
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Trigger: ${{ github.event_name }}