name: Deploy MkDocs Site

on:
  push:
    branches:
      - main
    paths:
      - 'source/docs/**'
      - 'source/mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Build
        run: |
          pip install -r requirements.txt
          cd source
          mkdocs build -d ../docs

      - name: Add .nojekyll file
        run: |
          touch docs/.nojekyll
          echo "✅ .nojekyll created in docs folder"

      - name: Verify .nojekyll
        run: |
          echo "📁 Contents of docs folder:"
          ls -la docs/
          if [ -f docs/.nojekyll ]; then
            echo "✅ SUCCESS: .nojekyll is present!"
          else
            echo "❌ ERROR: .nojekyll not found!"
            exit 1
          fi

      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: release
          enable_jekyll: false
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy MkDocs site from main: ${{ github.sha }}'