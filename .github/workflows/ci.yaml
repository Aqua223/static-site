name: Publish docs via GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  - name: Build site
    run: |
      mkdocs build -f source/mkdocs.yaml -d docs

  - name: Publish to release branch
    uses: peaceiris/actions-gh-pages@v3
    with:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      publish_dir: ./docs
      publish_branch: release
      commit_message: "feat: автоматическое обновление сайта"
      force_orphan: true
