name: Deploy MkDocs Site

on:
  push:
    branches:
      - main
    paths:
      - 'source/docs/**'
      - 'source/mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        run: |
          cd source
          mkdocs build --verbose -d ../docs  # Используем site вместо docs

      - name: Create .nojekyll and disable Jekyll completely
        run: |
          # Создаем .nojekyll
          touch docs/.nojekyll
          
          # Создаем пустой _config.yml для отключения Jekyll
          echo "# Jekyll disabled" > docs/_config.yml
          echo "include: ['.nojekyll']" >> docs/_config.yml
          
          # Проверяем
          echo "✅ Jekyll disabled files created:"
          ls -la docs/ | grep -E "(.nojekyll|_config.yml)"

      - name: Deploy to release branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: release
          force_orphan: true
          enable_jekyll: false
          disable_nojekyll: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy MkDocs site from main: ${{ github.sha }}'